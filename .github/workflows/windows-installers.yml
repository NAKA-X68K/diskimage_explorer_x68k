name: Build Windows Installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "scripts/build-windows.ps1"
      - "scripts/build-windows-installer.ps1"
      - "scripts/build-windows-msi.ps1"
      - "installer/windows/**"
      - "diskimage_explorer_x68k.spec"
      - "requirements*.txt"
      - "pyproject.toml"

jobs:
  build-windows-installers:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup --no-progress -y

      - name: Build app with PyInstaller
        shell: powershell
        run: |
          .\scripts\build-windows.ps1

      - name: Build setup.exe (Inno Setup)
        shell: powershell
        run: |
          .\scripts\build-windows-installer.ps1 -SkipBuild

      - name: Build .msi (WiX)
        shell: powershell
        run: |
          .\scripts\build-windows-msi.ps1 -SkipBuild

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dist/diskimage_explorer_x68k-windows-setup-*.exe
            dist/diskimage_explorer_x68k-windows-*.msi
          if-no-files-found: error
